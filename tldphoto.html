<!DOCTYPE html>
<html>
<head>
    <!-- Oswald font -->
    <link rel="preload" href="static/Oswald-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'Oswald';
            src: url('static/Oswald-Regular.woff2') format('woff2'),
                 url('static/Oswald-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .oswald {
            font-family: 'Oswald', sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        .oswald-bold {
            font-family: 'Oswald', sans-serif;
            font-optical-sizing: auto;
            font-weight: 600;
            font-style: normal;
        }
    </style>

    <style>
        html {
            background-image: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 200px), url('static/tld-road.jpg');
            background-position: center top, center top;
            background-repeat: no-repeat, no-repeat;
            background-attachment: fixed, fixed;
        }

        body {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #303e46;
            color: #fff;
            border-width: 20px;
            border-style: solid;
            border-image-source: url('static/tld-border.png');
            border-image-slice: 40;
            border-image-repeat: repeat;
            border-image-outset: 10px;
        }

        h1 {
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        #dropZone {
            display: block;
            margin: 0 0 20px 0;
            padding: 20px;
            background-color: #fff;
            color: #000;
            cursor: pointer;
        }
        #dropZone.dragover {
        }
        #dropZone.dropped {
            background-color: yellow;
        }

        #dropZone #resetAction {
            display: none;
        }
        #dropZone.dropped #resetAction {
            display: inline-block;
        }

        #fileInput {
            display: none;
        }

        #photoList {
            display: block;
            margin: 0 0 20px 0;
        }
        #photoList img {
            display: inline-block;
            width: 128px;
            margin: 2px 2px;
            border: 10px solid #fff;
            cursor: pointer;
        }

    </style>
</head>
<body class='oswald'>
    <h1 class='oswald-bold'>The Long Darkroom</h1>
    <label id="dropZone">
        Drop your <b>photo1</b> file here, or click to browse and upload it.
        <input type="file" id="fileInput" accept="*">
        <button id="resetAction">Reset</button>
    </label>
    <div id="photoActions">
        <button id="downloadAllAction">Download all</button>
        <button id="downloadSelectedAction">Download selected</button>
    </div>
    <div id="photoList"></div>
    <div style='height: 10000px;'></div>
    <script src="tldphoto.js"></script>
</body>
</html>
